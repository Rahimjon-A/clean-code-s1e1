<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" type="text/css" media="screen" charset="utf-8" />
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet" />
    <title>Todo App</title>
  </head>

  <body>
    <div class="info">
      <img class="info__img" src="eisenhower-matrix.jpg" alt="Main Content Image" />
      <a class="more_inf" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </div>

    <div class="main-element">
      <div id="adding-element-to-list">
        <label class="new-task" for="new-task">Add Item</label>
        <div class="task-row-wrapper">
          <input id="new-task" class="task-add" type="text" />
          <button class="add">Add</button>
        </div>
      </div>

      <h3 class="title">Todo</h3>

      <ul id="incomplete-tasks" class="task-list">
        <li class="list-item">
          <input type="checkbox" class="task-checkbox" />
          <label class="task">Pay Bills</label>
          <input type="text" class="task-add" />
          <button class="edit">Edit</button>
          <button class="delete">
            <img class="cross-pic" src="remove.svg" alt="Delete Button Icon" />
          </button>
        </li>

        <li class="list-item edit-mode">
          <input type="checkbox" class="task-checkbox" />
          <label class="task">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task-add" />
          <button class="edit">Save</button>
          <button class="delete">
            <img class="cross-pic" src="remove.svg" alt="Delete Button Icon" />
          </button>
        </li>
      </ul>

      <h3 class="title">Completed</h3>

      <ul id="completed-tasks" class="task-list">
        <li class="list-item">
          <input type="checkbox" checked class="task-checkbox" />
          <label class="task">See the Doctor</label>
          <input type="text" class="task-add" />
          <button class="edit">Edit</button>
          <button class="delete">
            <img class="cross-pic" src="remove.svg" alt="Delete Button Icon" />
          </button>
        </li>
      </ul>
    </div>

    <script src="app.js"></script>
  </body>
</html>
